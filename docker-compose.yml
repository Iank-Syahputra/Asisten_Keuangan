version: '3.8'

services:
  asisten-keuangan-app:
    build:
      context: .
      dockerfile: Dockerfile
      # Next.js requires NEXT_PUBLIC_ variables during the BUILD step to inject them into the frontend code
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: asisten-keuangan-app
    restart: always
    networks:
      - proxy_network
    environment:
      - VIRTUAL_HOST=akum.meambo.id
      - LETSENCRYPT_HOST=akum.meambo.id
      - LETSENCRYPT_EMAIL=emailkamu@gmail.com
      - VIRTUAL_PORT=3000
      
      # Private Keys (Backend Only)
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - XENDIT_SECRET_KEY=${XENDIT_SECRET_KEY}
      - XENDIT_WEBHOOK_TOKEN=${XENDIT_WEBHOOK_TOKEN}
      
      # Public Keys (Usually already injected at build time, but good to have)
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
      - NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      
      #GROQ_API_KEY
      - GROQ_API_KEY
      
      # App Config
      - NODE_ENV=production

networks:
  proxy_network:
    external: true